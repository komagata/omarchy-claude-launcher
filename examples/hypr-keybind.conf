# Example Hyprland keybinding for claude-launcher.
# Append this line to ~/.config/hypr/bindings.conf (or similar).
#
# Super+I opens the launcher. Change the key to whatever suits you —
# omarchy uses most single-letter Super bindings, so I, Q, R, Z, and
# semicolon tend to be free.

bindd = SUPER, I, Claude project launcher, exec, claude-launcher
